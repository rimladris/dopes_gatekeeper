<!DOCTYPE html>
<html>
<head>
  <title>Dopes Gatekeeper</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #1b1b1f;
      --card: #232329;
      --border: #34343c;
      --text: #f2f2f5;
      --text-dim: #9a9aa5;
      --accent: #7c9eff;
      --ok: #4cc38a;
      --warn: #e8b339;
      --danger: #e5636a;
    }

    * { box-sizing: border-box; }

    body {
      width: 240px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    header .title-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    #settings {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 4px;
      cursor: pointer;
      border-radius: 6px;
      opacity: 0.6;
      transition: opacity 0.15s ease, background 0.15s ease;
    }

    #settings:hover {
      opacity: 1;
      background: var(--card);
    }

    header img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      border-radius: 6px;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      color: var(--text-dim);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
    }

    #countdown {
      font-size: 34px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    #countdown.warn { color: var(--warn); }
    #countdown.danger { color: var(--danger); }

    #status-label {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    #reset {
      width: 100%;
      margin-top: 12px;
      padding: 9px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    #reset:hover {
      background: var(--card);
    }

    #reset .primary {
      display: block;
      font-size: 12px;
      font-weight: 600;
    }

    #reset .secondary {
      display: block;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <header>
    <div class="title-group">
      <img src="png/dopes_1.png" alt="Dopes the cat">
      <h1>Dopes Gatekeeper</h1>
    </div>
    <button id="settings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </header>
  <div class="card">
    <div id="countdown">--:--</div>
    <div id="status-label"></div>
  </div>
  <button id="reset">
    <span class="primary">Reset Timer</span>
    <span class="secondary">because i hate dopes</span>
  </button>
  <script src="popup.js"></script>
</body>
</html>
