<!DOCTYPE html>
<html>
<head>
  <title>Dopes Gatekeeper Options</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #1b1b1f;
      --card: #232329;
      --border: #34343c;
      --text: #f2f2f5;
      --text-dim: #9a9aa5;
      --accent: #7c9eff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 420px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    header img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 8px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      margin: 0 0 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .card code {
      color: var(--text);
      background: var(--bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .mode-option:hover {
      background: var(--card);
    }

    .mode-option.selected {
      border-color: var(--accent);
      background: var(--card);
    }

    .mode-option .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .mode-option .sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .mode-option input {
      accent-color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <img src="png/dopes_1.png" alt="Dopes the cat">
    <h1>Dopes Gatekeeper Settings</h1>
  </header>

  <h2>Allowance</h2>
  <label class="mode-option" id="option-standard">
    <div>
      <div class="label">Standard</div>
      <div class="sub">30 min allowance, 10 min break</div>
    </div>
    <input type="radio" name="mode" value="standard">
  </label>
  <label class="mode-option" id="option-extended">
    <div>
      <div class="label">Extended</div>
      <div class="sub">45 min allowance, 15 min break</div>
    </div>
    <input type="radio" name="mode" value="extended">
  </label>

  <div class="card">
    Applies to YouTube, Twitch, and Instagram.
  </div>

  <script src="options.js"></script>
</body>
</html>
